<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/estilos.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../js/funciones.js"></script>
    <title>Contacto</title>
</head>
<body>

<nav class="menu">
    <ul>
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="arte.html">Arte</a></li>
        <li><a href="deporte.html">Deporte</a></li>
    </ul>
</nav>

<header>
    <h1>Formulario para contacto</h1>
</header>

<section>
<form id="formulario">


<label for="nombre">Nombre:</label><br>
<input type="text" id="nombre" name="nombre">
<p id="mensaje2" class="mensaje-error"></p>
<br>


<label for="apellido">Apellido:</label><br>
<input type="text" id="apellido" name="apellido">
<p id="mensaje3" class="mensaje-error"></p>
<br>


<label for="edad">Edad:</label><br>
<input type="number" id="edad" name="edad" min="10" max="100">
<p id="mensaje4" class="mensaje-error"></p>
<br>


<label for="password">Contraseña:</label><br>
<input type="password" id="password" name="password">
<p id="mensaje5" class="mensaje-error"></p>
<br>

<label for="email">Correo electrónico:</label><br>
<input type="email" id="email" name="email">
<p id="mensaje6" class="mensaje-error"></p>
<br>

<label for="telefono">Teléfono:</label><br>
<input type="tel" id="telefono" name="telefono">
<p id="mensaje7" class="mensaje-error"></p>
<br>


<label for="ciudad">Ciudad:</label><br>
<select id="ciudad" name="ciudad">
    <option value="">Seleccione una ciudad</option>
    <option value="ancud">Ancud</option>
    <option value="castro">Castro</option>
    <option value="puertomontt">Puerto Montt</option>
</select>
<p id="mensaje8" class="mensaje-error"></p>
<br>


<label>Género:</label><br>
<input type="radio" name="genero" value="masculino"> Masculino<br>
<input type="radio" name="genero" value="femenino"> Femenino
<p id="mensaje9" class="mensaje-error"></p>
<br>


<label>Intereses:</label><br>
<input type="checkbox" name="interes" value="arte"> Arte<br>
<input type="checkbox" name="interes" value="deporte"> Deporte<br>
<input type="checkbox" name="interes" value="tecnologia"> Tecnología
<p id="mensaje10" class="mensaje-error"></p>
<br>

<label>¿Cometió algún crimen anteriormente?</label><br>
<input type="radio" name="crimen" value="si"> Si<br>
<input type="radio" name="crimen" value="no"> No<br>
<input type="radio" name="crimen" value="no se"> No sé
<p id="mensaje11" class="mensaje-error"></p>
<br>


<label for="fecha">Fecha de inscripción:</label><br>
<input type="date" id="fecha" name="fecha">
<p id="mensaje12" class="mensaje-error"></p>
<br>


<label for="mensaje">Mensaje:</label><br>
<textarea id="mensaje" name="mensaje" rows="4"></textarea>
<p id="mensaje13" class="mensaje-error"></p>
<br>


<input type="submit" value="Enviar">
<input type="reset" value="Limpiar">
<p id="mensaje14" class="mensaje-correcto"></p>
</form>
</section>

<nav>
    <a href="../index.html">← Volver al inicio</a>
</nav>

</body>

</html>
